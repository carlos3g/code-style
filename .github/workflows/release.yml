name: Release

# Triggered by pushing a tag like v1.2.3.
# Local flow:
#   yarn version <patch|minor|major>
#   git commit -am "chore: release vX.Y.Z"
#   git tag vX.Y.Z
#   git push origin main --tags
#
# Trusted publisher must be configured at:
#   https://www.npmjs.com/package/@carlos3g/eslint-config/access
# pointing to:
#   repo:     carlos3g/code-style
#   workflow: .github/workflows/release.yml
#   environment: (none)
#
# No NPM_TOKEN secret required — the workflow authenticates via OIDC.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Syntax check presets
        run: yarn check

      - name: Self-lint
        run: yarn lint

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
