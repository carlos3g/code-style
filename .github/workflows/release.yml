name: Release

# Driven by release-please. Flow:
#   1. push to main with a conventional commit (feat:, fix:, chore!:, etc.)
#   2. release-please opens/updates a "Release PR" with version bump + CHANGELOG
#   3. merging that PR creates the tag + GitHub Release
#   4. the publish job below then publishes to npm with provenance via OIDC
#
# Trusted publisher (configure once at npmjs.com):
#   repo:     carlos3g/code-style
#   workflow: .github/workflows/release.yml
#
# No NPM_TOKEN secret required — auth via OIDC.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Syntax check presets
        run: yarn check

      - name: Self-lint
        run: yarn lint

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
